server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para o backend
    location /chat {
        proxy_pass         http://backend:8000/chat;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 120s;
    }

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
